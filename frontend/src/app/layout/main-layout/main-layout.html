<div class="shell" [class.sidebar-open]="sidebarOpen()">

  <!-- Mobile overlay -->
  <div class="overlay" (click)="closeSidebar()" aria-hidden="true"></div>

  <!-- ════════════════════════════════
       Sidebar
  ════════════════════════════════ -->
  <aside class="sidebar">

    <div class="sidebar-brand">
      <span class="brand-icon" aria-hidden="true">V</span>
      <span class="brand-name">{{ sidebarBrandName() }}</span>
    </div>

    <nav class="sidebar-nav" aria-label="Menu principal">

      <!-- Home (route: /dashboard) -->
      <a routerLink="/dashboard" routerLinkActive="nav-active"
         [routerLinkActiveOptions]="{ exact: true }"
         class="nav-item" (click)="closeSidebar()">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Home
      </a>

      <!-- ── Impressoras (expandable) ── -->
      <div class="nav-group" [class.group-open]="printersOpen()">

        <button class="nav-item nav-group-trigger" type="button"
          (click)="togglePrinters()" [attr.aria-expanded]="printersOpen()">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          Impressoras
          <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>

        <div class="nav-submenu">
          <a routerLink="/impressoras" routerLinkActive="sub-active"
             [routerLinkActiveOptions]="{ exact: true }"
             class="sub-item" (click)="closeSidebar()">
            Minhas Impressoras
          </a>
          <a routerLink="/impressoras/manutencao" routerLinkActive="sub-active"
             class="sub-item" (click)="closeSidebar()">
            Manutenção
          </a>
        </div>
      </div>

      <!-- Produção -->
      <a routerLink="/producao" routerLinkActive="nav-active"
         class="nav-item" (click)="closeSidebar()">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
        Produção
      </a>

      <a routerLink="/how-it-works" routerLinkActive="nav-active"
         class="nav-item" (click)="closeSidebar()">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Como funciona
      </a>

      <!-- Custos (em breve) -->
      <span class="nav-item nav-disabled" aria-disabled="true">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        Custos
        <span class="badge-soon">Em breve</span>
      </span>

    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" type="button" (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sair
      </button>
    </div>
  </aside>

  <!-- ════════════════════════════════
       Main area
  ════════════════════════════════ -->
  <div class="main-area">

    <header class="topbar">
      <button class="burger" type="button" (click)="toggleSidebar()"
        [attr.aria-expanded]="sidebarOpen()" aria-label="Abrir menu">
        <span></span><span></span><span></span>
      </button>

      <div class="topbar-right">

        <!-- Theme toggle -->
        <button class="theme-toggle" type="button"
          (click)="themeService.toggle()"
          [attr.aria-label]="themeService.theme() === 'dark' ? 'Mudar para modo claro' : 'Mudar para modo escuro'"
          [attr.title]="themeService.theme() === 'dark' ? 'Modo claro' : 'Modo escuro'">

          @if (themeService.theme() === 'dark') {
            <!-- Sun: switch to light -->
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          } @else {
            <!-- Moon: switch to dark -->
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          }
        </button>

        <!-- User menu -->
        <div class="user-menu-wrap" (click)="$event.stopPropagation()">
          <button class="user-menu-trigger" type="button"
            (click)="toggleUserMenu()"
            [attr.aria-expanded]="userMenuOpen()"
            aria-label="Menu do usuário">
            <div class="user-info">
              <span class="user-name">{{ currentUser()?.name ?? 'Usuário' }}</span>
              <span class="user-role">{{ currentUser()?.email ?? '' }}</span>
            </div>
            <div class="avatar" aria-hidden="true">{{ initials(currentUser()) }}</div>
          </button>

          @if (userMenuOpen()) {
            <div class="user-dropdown" role="menu">
              <a class="dropdown-item" routerLink="/settings/profile"
                (click)="userMenuOpen.set(false)" role="menuitem">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" aria-hidden="true">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
                Perfil
              </a>
              <div class="dropdown-divider" role="separator"></div>
              <button class="dropdown-item dropdown-item--danger" type="button"
                (click)="logout()" role="menuitem">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" aria-hidden="true">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Sair
              </button>
            </div>
          }
        </div>
      </div>
    </header>

    <main class="page-content">
      <router-outlet />
    </main>

  </div>
</div>
