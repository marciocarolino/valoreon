@if (isOpen()) {
  <div class="modal-overlay" role="dialog" aria-modal="true"
    aria-labelledby="feedback-modal-title" (click)="onOverlayClick($event)">

    <div class="modal-card">

      <!-- Header -->
      <div class="modal-header">
        <h2 class="modal-title" id="feedback-modal-title">Enviar feedback</h2>
        <button class="modal-close" type="button" (click)="close()"
          aria-label="Fechar" [disabled]="isSaving()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Success state -->
      @if (success()) {
        <div class="success-block" role="status">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="9 12 11 14 15 10"/>
          </svg>
          <p>Feedback enviado! Obrigado pela contribuição.</p>
        </div>
      } @else {

        <!-- Error banner -->
        @if (error()) {
          <div class="alert-banner alert-error" role="alert">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ error() }}
          </div>
        }

        <!-- Tipo -->
        <div class="field">
          <label class="field-label" for="fb-type">Tipo</label>
          <select id="fb-type" class="field-select" [(ngModel)]="type" [disabled]="isSaving()">
            @for (opt of typeOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>

        <!-- Mensagem -->
        <div class="field">
          <label class="field-label" for="fb-message">Mensagem</label>
          <textarea id="fb-message" class="field-textarea"
            [(ngModel)]="message"
            [disabled]="isSaving()"
            placeholder="Descreva sua sugestão, feedback ou bug encontrado…"
            rows="5"
            maxlength="1000">
          </textarea>
          <span class="field-hint">{{ message.length }}/1000</span>
        </div>

        <!-- Email opcional -->
        <div class="field">
          <label class="field-label" for="fb-email">
            Seu email
            <span class="field-label-optional">(opcional)</span>
          </label>
          <input id="fb-email" class="field-input"
            [class.is-invalid]="emailInvalid"
            type="email"
            [(ngModel)]="email"
            [disabled]="isSaving()"
            placeholder="seu@email.com"
            autocomplete="email"
            (blur)="validateEmail()">
          @if (emailInvalid) {
            <span class="field-hint field-hint--error">Formato de email inválido</span>
          }
        </div>

        <!-- Actions -->
        <div class="modal-actions">
          <button class="btn-cancel" type="button" (click)="close()" [disabled]="isSaving()">
            Cancelar
          </button>
          <button class="btn-save" type="button"
            [disabled]="!message.trim() || emailInvalid || isSaving()" (click)="submit()">
            @if (isSaving()) {
              <span class="btn-spinner" aria-hidden="true"></span>
              Enviando…
            } @else {
              Enviar feedback
            }
          </button>
        </div>

      }

    </div>
  </div>
}
