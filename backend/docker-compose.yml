version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: valoreon-postgres
    restart: always
    environment:
      POSTGRES_DB: valoreon_db
      POSTGRES_USER: valoreon
      POSTGRES_PASSWORD: valoreon123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: