spring.application.name=valoreon

spring.main.web-application-type=servlet

server.servlet.context-path=/api
server.port=${PORT:8080}

# 🐘 PostgreSQL (SEM fallback em produção)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway (executa antes do Hibernate)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# 🧠 JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Swagger (desativado por padrão em produção)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# 🔐 JWT — access token (15 minutos)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:900000}

# 🔁 Refresh token — 7 dias
refresh.token.expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:7}

# 🍪 Cookie seguro (produção = true)
cookie.secure=${COOKIE_SECURE:true}

# 🌐 CORS (controlado por variável)
cors.origin=${CORS_ORIGIN}